name: Update Profile Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: update-profile-cards
  cancel-in-progress: false

jobs:
  refresh-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python3 -m unittest tests.test_update_profile_cards -v

      - name: Regenerate local SVG cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_profile_cards.py

      - name: Verify generated profile assets
        run: bash scripts/verify-profile-readme.sh

      - name: Commit refreshed cards
        run: |
          if git diff --quiet -- profile/README.md profile/assets/github-stats-card.svg profile/assets/top-langs-card.svg; then
            echo "No profile README or card changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/README.md profile/assets/github-stats-card.svg profile/assets/top-langs-card.svg
          git commit -m "chore: refresh profile readme assets"
          git push

<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">sine-io Cyber-Wave banner</title>
  <desc id="desc">A minimal dark banner with a cyan sine wave and the text sine-io.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#03060D"/>
      <stop offset="1" stop-color="#0A1022"/>
    </linearGradient>
    <linearGradient id="wave" x1="70" y1="0" x2="1130" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#5B8CFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="272" rx="20" fill="#050A14" stroke="#10314A" stroke-opacity="0.7"/>

  <path d="M70 215C123 187 176 131 229 131C282 131 335 215 388 215C441 215 494 131 547 131C600 131 653 215 706 215C759 215 812 131 865 131C918 131 971 215 1024 215C1077 215 1130 159 1130 159" stroke="url(#wave)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M70 215C123 187 176 131 229 131C282 131 335 215 388 215C441 215 494 131 547 131C600 131 653 215 706 215C759 215 812 131 865 131C918 131 971 215 1024 215C1077 215 1130 159 1130 159" stroke="#B2F7FF" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="90" cy="76" r="4" fill="#00E5FF"/>
  <circle cx="110" cy="76" r="4" fill="#00E5FF" fill-opacity="0.6"/>
  <circle cx="130" cy="76" r="4" fill="#00E5FF" fill-opacity="0.3"/>

  <text x="72" y="118" fill="#D9FCFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" letter-spacing="6">CYBER-WAVE</text>
  <text x="72" y="182" fill="#F2FBFF" font-family="JetBrains Mono, Consolas, monospace" font-size="64" font-weight="700">sine-io</text>
  <text x="72" y="222" fill="#8AA6C2" font-family="JetBrains Mono, Consolas, monospace" font-size="18">Input / Output the Future.</text>
</svg>
